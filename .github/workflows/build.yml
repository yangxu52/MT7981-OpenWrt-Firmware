name: Build OpenWrt Firmware

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Device profile
        required: true
        type: choice
        options:
          - h3c-nx30pro
          - cmcc-rax3000m

      upload_artifact:
        description: Upload firmware artifact
        required: true
        type: boolean
        default: true

      create_release:
        description: Create GitHub release
        required: true
        type: boolean
        default: false

env:
  REPO_URL: https://github.com/yangxu52/immortalwrt-mt798x
  REPO_BRANCH: openwrt-21.02
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build ${{ inputs.profile }}
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Load Profile
        shell: bash
        run: |
          bash scripts/ci/env.sh load-profile "${{ inputs.profile }}"

      - name: Cleanup Runner
        shell: bash
        run: |
          df -hT
          bash scripts/ci/cleanup.sh runner
          df -hT

      - name: Initialize Build Environment
        env: 
          DEBIAN_FRONTEND: noninteractive
        shell: bash
        run: |
          bash scripts/ci/build.sh init

      - name: Prepare Source Tree
        shell: bash
        run: |
          bash scripts/ci/build.sh prepare-source

      - name: Compute Cache Keys
        shell: bash
        run: |
          bash scripts/ci/cache.sh compute-keys

      - name: Restore Tools Host Cache
        uses: actions/cache@v5
        with:
          path: |
            openwrt/build_dir/host
            openwrt/staging_dir/host
          key: tools-host-${{ env.TOOL_HEAD }}

      - name: Restore Toolchain Cache
        uses: actions/cache@v5
        with:
          path: |
            openwrt/build_dir/toolchain-*
            openwrt/staging_dir/toolchain-*
          key: toolchain-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ env.TOOLCHAIN_HEAD }}

      - name: Restore Hostpkg Cache
        uses: actions/cache@v5
        with:
          path: |
            openwrt/build_dir/hostpkg
            openwrt/staging_dir/hostpkg
          key: hostpkg-lang-${{ env.LANG_HEAD }}

      - name: Restore Ccache
        uses: actions/cache@v5
        with:
          path: openwrt/.ccache
          key: ccache-${{ env.DEVICE }}-${{ env.CCACHE_HASH }}
          restore-keys: |
            ccache-${{ env.DEVICE }}-
            ccache-

      - name: Normalize Cache Directories
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          mkdir -p openwrt/.ccache
          find openwrt/staging_dir openwrt/build_dir -type d -exec chmod u+rwx {} + 2>/dev/null || true
          ccache -M 2G || true
          ccache -s || true

      - name: Apply Profile
        shell: bash
        run: |
          bash scripts/ci/build.sh apply-profile

      - name: Download Dependencies
        shell: bash
        run: |
          bash scripts/ci/build.sh download

      - name: Compile Firmware
        shell: bash
        run: |
          bash scripts/ci/build.sh compile

      - name: Show Disk Usage After Compile
        if: ${{ !cancelled() }}
        run: df -hT

      - name: Collect Artifacts
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          bash scripts/ci/collect.sh

      - name: Upload Firmware Artifact
        if: ${{ success() && inputs.upload_artifact }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.FIRMWARE_DIR }}

      - name: Prepare Release Metadata
        if: ${{ success() && inputs.create_release }}
        shell: bash
        run: |
          bash scripts/ci/build.sh prepare-release

      - name: Publish Release
        if: ${{ success() && inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body_path: ${{ env.RELEASE_BODY }}
          files: ${{ env.FIRMWARE_DIR }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete Old Releases
        if: ${{ success() && inputs.create_release }}
        uses: dev-drprasad/delete-older-releases@master
        with:
          keep_latest: 7
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete Old Workflow Runs
        if: ${{ !cancelled() }}
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 3
